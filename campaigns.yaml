# Sigil Scraper Campaigns - Albania Political Content
# Keywords: Protesta, Kushner, Trump, Edi Rama
# Location: Albania

campaigns:
  # TikTok campaign - compound story queries only
  - platform: tiktok
    topic: albania_political
    country: AL
    seeds:
      - "Jared Kushner Albania protest"
      - "Kushner Sazan Albania"
      - "Trump Kushner Albania resort"
      - "Ivanka Trump Albania resort"
      - "Edi Rama Kushner Sazan"
      - "Albania protest Kushner resort"
      - "Sazan Island Kushner protest"
      - "Kushner Shqiperi protesta"
    daily_target: 1000
    enabled: true

